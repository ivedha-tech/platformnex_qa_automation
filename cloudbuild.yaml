steps:
  # Build Docker image for Playwright tests
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/platformnex/platformnex-qa-tests:${SHORT_SHA}'
      - '.'
    dir: '.'

  # Push Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/platformnex/platformnex-qa-tests:${SHORT_SHA}'
    dir: '.'

  # Run Playwright tests in the container
  - name: '${_REGION}-docker.pkg.dev/${PROJECT_ID}/platformnex/platformnex-qa-tests:${SHORT_SHA}'
    env:
      - 'BASE_URL=${_BASE_URL}'
      - 'LOGIN_EMAIL=${_LOGIN_EMAIL}'
      - 'LOGIN_PASSWORD=${_LOGIN_PASSWORD}'
      - 'CI=true'
      - 'HEADLESS=${_HEADLESS}'
    dir: '.'

  # Upload test reports to Cloud Storage
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Use build ID as timestamp
        TIMESTAMP=${BUILD_ID}
        
        # Upload test reports if they exist
        if [ -d "reports" ]; then
          echo "Uploading test reports..."
          gsutil -m cp -r reports/* gs://${_REPORT_BUCKET}/reports/$$TIMESTAMP/
        fi
        
        if [ -d "test-results" ]; then
          echo "Uploading test results..."
          gsutil -m cp -r test-results/* gs://${_REPORT_BUCKET}/results/$$TIMESTAMP/
        fi
        
        if [ -d "playwright-report" ]; then
          echo "Uploading Playwright report..."
          gsutil -m cp -r playwright-report/* gs://${_REPORT_BUCKET}/playwright-report/$$TIMESTAMP/
        fi
        
        echo "Test execution completed. Reports uploaded to:"
        echo "gs://${_REPORT_BUCKET}/reports/$$TIMESTAMP/"
        echo "gs://${_REPORT_BUCKET}/results/$$TIMESTAMP/"
        echo "gs://${_REPORT_BUCKET}/playwright-report/$$TIMESTAMP/"
    dir: '.'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
